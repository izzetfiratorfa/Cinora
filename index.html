/* ===== Özel alan (yumuşak kilit / vault) ===== */
var VAULT_PIN_KEY="cinora_vault_pin";
var vaultUnlocked=false, vaultTimer=null, VAULT_TIMEOUT=10*60*1000;
function isAdult(it){ return (it.collections||[]).indexOf("N'18")>-1; }
function vaultHidden(){ return childMode() || !vaultUnlocked; }       // kilitliyse +18 gizli
function vaultAllows(it){ return !(isAdult(it) && vaultHidden()); }
function vaultHasPin(){ return !!localStorage.getItem(VAULT_PIN_KEY); }
function resetVaultTimer(){ if(!vaultUnlocked) return; clearTimeout(vaultTimer); vaultTimer=setTimeout(lockVault, VAULT_TIMEOUT); }
function unlockVault(){ vaultUnlocked=true; resetVaultTimer(); renderTabs(); renderFilterbar(); renderGrid(); renderCloud(); toast("Özel alan açıldı"); }
function lockVault(silent){
  vaultUnlocked=false; clearTimeout(vaultTimer);
  if(state.view==="vault"||state.view==="col:N'18") state.view="all";
  if(state.tags) state.tags=[];
  renderTabs(); renderFilterbar(); renderGrid(); renderCloud();
  if(!silent) toast("Özel alan kilitlendi");
}
function vaultUniverse(){ return state.items.filter(vaultAllows); }
function pinHash(s){ return hashStr("nora:"+s); }
function openVaultGate(){
  var ov=document.getElementById("vaultOverlay");
  if(!ov){
    ov=document.createElement("div"); ov.id="vaultOverlay"; ov.className="overlay";
    document.body.appendChild(ov);
    ov.addEventListener("click",function(e){ if(e.target===ov) closeVaultGate(); });
  }
  var setup=!vaultHasPin();
  ov._buf=""; ov._first=null; ov._setup=setup;
  ov.innerHTML=
    '<div class="modal vault-modal" role="dialog" aria-modal="true" aria-label="Özel alan">'
    +'<button class="vault-x" id="vaultClose" aria-label="Kapat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>'
    +'<div class="vault-key"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg></div>'
    +'<div class="vault-epi" id="vaultEpi">'+(setup?"Özel alanın için bir PIN belirle.":"“Bazı raflar yalnızca gece açılır.”")+'</div>'
    +'<div class="vault-dots" id="vaultDots"></div>'
    +'<div class="vault-pad" id="vaultPad"></div>'
    +'<div class="vault-note" id="vaultNote">'+(setup?"4–6 hane · sonra tekrar girersin":"oturum sonunda yeniden kilitlenir")+'</div>'
    +'</div>';
  var pad=ov.querySelector("#vaultPad");
  ["1","2","3","4","5","6","7","8","9","ok","0","del"].forEach(function(k){
    var b=document.createElement("button"); b.className="kp";
    if(k==="del"){ b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><path d="M20 6H9l-5 6 5 6h11a2 2 0 002-2V8a2 2 0 00-2-2z"/><path d="M18 9l-5 6M13 9l5 6"/></svg>'; b.setAttribute("aria-label","sil"); }
    else if(k==="ok"){ b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="width:20px;height:20px"><path d="M20 6L9 17l-5-5"/></svg>'; b.setAttribute("aria-label","onayla"); b.classList.add("kp-ok"); }
    else { b.textContent=k; }
    b.onclick=function(){ vaultKey(k); };
    pad.appendChild(b);
  });
  ov.querySelector("#vaultClose").onclick=closeVaultGate;
  paintVaultDots();
  ov.classList.add("show"); document.body.style.overflow="hidden";
}
function paintVaultDots(){
  var ov=document.getElementById("vaultOverlay"); if(!ov) return;
  var d=ov.querySelector("#vaultDots"), n=ov._buf.length, max=6, h="";
  for(var i=0;i<max;i++){ h+='<span class="vd'+(i<n?" on":"")+'"></span>'; }
  d.innerHTML=h;
}
function vaultKey(k){
  var ov=document.getElementById("vaultOverlay"); if(!ov) return;
  if(k==="del"){ ov._buf=ov._buf.slice(0,-1); paintVaultDots(); return; }
  if(k==="ok"){ vaultSubmit(); return; }
  if(ov._buf.length>=6) return;
  ov._buf+=k; paintVaultDots();
  if(ov._buf.length===6) setTimeout(vaultSubmit, 120);
}
function vaultShake(){ var m=document.querySelector(".vault-modal"); if(m){ m.classList.remove("shake"); void m.offsetWidth; m.classList.add("shake"); } }
function vaultSubmit(){
  var ov=document.getElementById("vaultOverlay"); if(!ov) return;
  var buf=ov._buf;
  if(ov._setup){
    if(buf.length<4){ document.getElementById("vaultNote").textContent="En az 4 hane gerekli."; vaultShake(); return; }
    if(ov._first===null){ ov._first=buf; ov._buf=""; paintVaultDots();
      document.getElementById("vaultEpi").textContent="Bir daha gir, doğrulayalım.";
      document.getElementById("vaultNote").textContent="aynı PIN'i tekrar gir"; return; }
    if(buf!==ov._first){ ov._first=null; ov._buf=""; paintVaultDots();
      document.getElementById("vaultEpi").textContent="Eşleşmedi. Yeniden belirle.";
      document.getElementById("vaultNote").textContent="4–6 hane"; vaultShake(); return; }
    localStorage.setItem(VAULT_PIN_KEY, pinHash(buf)); closeVaultGate(); unlockVault(); return;
  }
  if(pinHash(buf)===localStorage.getItem(VAULT_PIN_KEY)){ closeVaultGate(); state.view="vault"; unlockVault(); }
  else{ ov._buf=""; paintVaultDots(); document.getElementById("vaultNote").textContent="Yanlış PIN."; vaultShake(); }
}

/* ===== Film Pasaportu (profil bazlı, Bauhaus) ===== */
function profileItems(p){
  if(!p || p.who.length===0){ return state.items.filter(function(it){ return vaultAllows(it) && (!(p&&p.child) || (it.collections||[]).indexOf("N'18")<0); }); }
  if(p.who.length>=2) return state.items.filter(vaultAllows);
  var who=p.who[0];
  return state.items.filter(function(it){
    if(!vaultAllows(it)) return false;
    var recd=(it.recommendedBy||[]).indexOf(who)>-1;
    var scored=(who==="Nur"&&it.scoreNur)||(who==="Fırat"&&it.scoreFirat);
    return recd||scored;
  });
}
var BAUHAUS=["#E0A33E","#C0473B","#3B6FB0","#E8D7C3","#7BA05B"];
function topFreqOf(items, getArr, n){
  var f={}; items.forEach(function(it){ getArr(it).forEach(function(k){ if(k) f[k]=(f[k]||0)+1; }); });
  return Object.keys(f).map(function(k){return [k,f[k]];}).sort(function(a,b){return b[1]-a[1]||a[0].localeCompare(b[0],"tr");}).slice(0,n);
}
function bauhausBars(rows, title){
  if(!rows.length) return '';
  var max=rows[0][1], W=300, rowH=34, H=rows.length*rowH+10;
  var bars=rows.map(function(r,i){
    var w=Math.round(r[1]/max*(W-150)), col=BAUHAUS[i%BAUHAUS.length], y=i*rowH+6;
    return '<text x="0" y="'+(y+15)+'" class="bh-lbl">'+esc(r[0].length>16?r[0].slice(0,15)+"…":r[0])+'</text>'
      +'<rect x="150" y="'+y+'" width="'+Math.max(8,w)+'" height="20" fill="'+col+'"/>'
      +'<text x="'+(150+Math.max(8,w)+8)+'" y="'+(y+15)+'" class="bh-n">'+r[1]+'</text>';
  }).join("");
  return '<div class="pass-sec"><div class="pass-h">'+esc(title)+'</div><svg viewBox="0 0 '+W+' '+H+'" class="bh-svg">'+bars+'</svg></div>';
}
function bauhausDonut(rows, title){
  if(!rows.length) return '';
  var total=rows.reduce(function(a,b){return a+b[1];},0), cx=70,cy=70,r=54, ang=-Math.PI/2;
  var segs=rows.map(function(row,i){
    var frac=row[1]/total, a2=ang+frac*Math.PI*2, large=frac>0.5?1:0, col=BAUHAUS[i%BAUHAUS.length];
    var x1=cx+r*Math.cos(ang), y1=cy+r*Math.sin(ang), x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    var d='M '+cx+' '+cy+' L '+x1.toFixed(1)+' '+y1.toFixed(1)+' A '+r+' '+r+' 0 '+large+' 1 '+x2.toFixed(1)+' '+y2.toFixed(1)+' Z';
    ang=a2; return '<path d="'+d+'" fill="'+col+'"/>';
  }).join("");
  var leg=rows.map(function(row,i){ return '<div class="bh-leg"><span style="background:'+BAUHAUS[i%BAUHAUS.length]+'"></span>'+esc(row[0])+' <b>'+row[1]+'</b></div>'; }).join("");
  return '<div class="pass-sec"><div class="pass-h">'+esc(title)+'</div><div class="donut-wrap">'
    +'<svg viewBox="0 0 140 140" class="bh-donut">'+segs+'<circle cx="70" cy="70" r="26" fill="var(--surface)"/></svg>'
    +'<div class="bh-legs">'+leg+'</div></div></div>';
}

function renderPassport(p){
  document.getElementById("passTitle").textContent="Film Pasaportu · "+p.label;

function boot(){
  applyAppearance();
  renderTabs(); renderFilterbar(); renderGrid();

  var content=document.getElementById("content");
  content.addEventListener("click",function(e){
    var f=e.target.closest("[data-fav]"); if(f){ e.stopPropagation(); toggleFav(f.getAttribute("data-fav")); return; }
    var w=e.target.closest("[data-watch]"); if(w){ e.stopPropagation(); toggleWatched(w.getAttribute("data-watch")); return; }

  });

    lpTimer=setTimeout(function(){ previewCentered(card); },480); },{passive:true});
  content.addEventListener("touchend",function(){ clearTimeout(lpTimer); });
  content.addEventListener("touchmove",function(){ clearTimeout(lpTimer); });

  var search=document.getElementById("search");
  search.addEventListener("input",function(e){ state.query=e.target.value; renderGrid(); renderSuggest(); });
  search.addEventListener("keydown",function(e){
    var box=document.getElementById("searchSuggest"), open=box.classList.contains("show");
    if(e.key==="ArrowDown"){ if(open){ e.preventDefault(); moveSuggest(1); } }
    else if(e.key==="ArrowUp"){ if(open){ e.preventDefault(); moveSuggest(-1); } }
    else if(e.key==="Enter"){ if(open&&suggestIdx>=0){ e.preventDefault(); pickSuggest(suggestList[suggestIdx]); } else hideSuggest(); }
    else if(e.key==="Escape"){ hideSuggest(); }
  });
  search.addEventListener("blur",function(){ setTimeout(hideSuggest,120); });
  search.addEventListener("focus",function(){ if(search.value) renderSuggest(); });

  document.getElementById("openAdmin").onclick=function(){ openAdmin(); };
  document.getElementById("openStats").onclick=function(){ openAdmin(); renderStats(); };
  document.getElementById("profileBtn").onclick=openProfilePicker;
  (function(){ var clicks=[]; var brand=document.getElementById("brand");
    if(brand) brand.addEventListener("click",function(){ var now=Date.now(); clicks.push(now); clicks=clicks.filter(function(t){return now-t<700;});
      if(clicks.length>=3){ clicks=[]; openVaultGate(); } }); })();
  document.addEventListener("click",resetVaultTimer,true);
  document.addEventListener("keydown",resetVaultTimer,true);
  document.addEventListener("touchstart",resetVaultTimer,{passive:true,capture:true});
  document.getElementById("moodOverlay").onclick=function(e){ if(e.target.id==="moodOverlay") closeMoodPicker(); };
  document.getElementById("passportOverlay").onclick=function(e){ if(e.target.id==="passportOverlay"){ e.currentTarget.classList.remove("show"); document.body.style.overflow=""; } };
  document.getElementById("profileOverlay").onclick=function(e){ if(e.target.id==="profileOverlay" && getProfile()){ e.currentTarget.classList.remove("show"); document.body.style.overflow=""; } };
  document.getElementById("closeAdmin").onclick=closeAdmin;
  document.getElementById("playerOverlay").onclick=function(e){ if(e.target.id==="playerOverlay") closePlayer(); };
  document.getElementById("adminOverlay").onclick=function(e){ if(e.target.id==="adminOverlay") closeAdmin(); };
  document.addEventListener("click",function(){ closePanels(); });
  document.addEventListener("keydown",function(e){
    var typing=/^(INPUT|TEXTAREA|SELECT)$/.test((e.target&&e.target.tagName)||"");
    if(!typing){
      if(e.key==="?"||(e.shiftKey&&e.key==="/")){ e.preventDefault(); openShortcuts(); return; }
      if(e.key==="/"){ e.preventDefault(); var s=document.getElementById("search"); if(s) s.focus(); return; }

}
